<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>TRPG招募</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js">
    </script>
    <style>
        /* ===== 重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #f2f5fa 0%, #e4e9f2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 12px;
        }

        /* ===== 主容器 ===== */
        .app {
            width: 1160px;
            max-width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 40px;
            padding: 28px 20px 32px;
            box-shadow: 0 24px 56px -16px rgba(10, 30, 60, 0.22), 0 6px 20px -6px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.2s;
        }

        /* ===== 工具栏卡片（右对齐） ===== */
        .toolbar-card {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
            gap: 10px 14px;
            padding: 10px 16px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.85);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03);
            min-height: 50px;
            transition: background 0.3s;
        }

        .toolbar-btn {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
            padding: 6px 16px;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .toolbar-btn:hover {
            transform: translateY(-2px);
        }
        .toolbar-btn:active {
            transform: translateY(0);
        }

        .btn-export {
            background: #4a6cf7;
            box-shadow: 0 4px 14px rgba(74, 108, 247, 0.25);
        }
        .btn-export:hover {
            background: #3a5cd9;
            box-shadow: 0 8px 24px rgba(74, 108, 247, 0.30);
        }

        .btn-toggle {
            background: #6c7a9a;
            box-shadow: 0 4px 14px rgba(108, 122, 154, 0.25);
        }
        .btn-toggle:hover {
            background: #5a6886;
            box-shadow: 0 8px 24px rgba(108, 122, 154, 0.30);
        }
        .btn-toggle.active-gm {
            background: #9b6bcf;
            box-shadow: 0 4px 14px rgba(155, 107, 207, 0.25);
        }
        .btn-toggle.active-gm:hover {
            background: #8a5bb8;
            box-shadow: 0 8px 24px rgba(155, 107, 207, 0.30);
        }

        .toolbar-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ===== 顶部标题 ===== */
        .app-header {
            text-align: center;
            padding-bottom: 20px;
            margin-bottom: 22px;
            border-bottom: 2px solid rgba(60, 80, 140, 0.12);
            position: relative;
        }

        .app-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #1a264f;
            display: inline-block;
            position: relative;
            transition: color 0.3s;
        }

        /* ===== 双列网格（默认桌面双列） ===== */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px 32px;
            align-items: start;
        }

        /* ===== 列 ===== */
        .col {
            display: flex;
            flex-direction: column;
            gap: 18px;
            min-width: 0;
        }

        /* ===== 卡片 ===== */
        .block {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 18px;
            padding: 18px 18px 20px;
            border: 1px solid rgba(255, 255, 255, 0.85);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03);
            transition: background 0.3s, box-shadow 0.2s;
        }

        .block-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a264f;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            transition: color 0.3s;
        }

        /* ===== 左列 — 模组信息标题 ===== */
        .mod-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a264f;
            letter-spacing: 1.5px;
            padding-bottom: 2px;
            transition: color 0.3s;
        }

        /* ===== 图片上传区域 ===== */
        .image-upload-wrapper {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 56.25%;
            border-radius: 14px;
            overflow: hidden;
            background: #e8ecf5;
            border: 2px dashed rgba(90, 110, 180, 0.25);
            cursor: pointer;
            transition: border-color 0.3s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .image-upload-wrapper:hover {
            border-color: rgba(60, 80, 160, 0.45);
            background-color: #e2e7f2;
        }

        .image-upload-wrapper .upload-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8a9bbd;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            pointer-events: none;
            user-select: none;
            gap: 6px;
            background: rgba(232, 236, 245, 0.7);
            backdrop-filter: blur(2px);
            transition: opacity 0.3s;
        }

        .image-upload-wrapper .upload-placeholder .arrow-icon {
            font-size: 24px;
            font-weight: 300;
            color: #b0c0dd;
            line-height: 1;
        }

        .image-upload-wrapper .upload-placeholder.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .image-upload-wrapper.has-image {
            border-style: solid;
            border-color: rgba(60, 80, 160, 0.2);
        }

        #imageInput {
            display: none;
        }

        /* ===== 五个信息标签 ===== */
        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 4px 0 2px 18px;
        }

        .info-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
            padding: 3px 0;
            border-bottom: 1px dashed rgba(60, 80, 140, 0.07);
        }

        .info-label {
            display: inline-block;
            width: 120px;
            flex-shrink: 0;
            text-align: left;
            font-weight: 700;
            color: #111b3a;
            font-size: 14px;
            letter-spacing: 0.02em;
            line-height: 1.6;
            transition: color 0.3s;
        }

        .info-value {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            padding: 2px 6px;
            border-radius: 6px;
            outline: none;
            transition: background 0.15s, color 0.3s, border-color 0.2s;
            min-height: 1.6em;
            line-height: 1.6;
            word-break: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid transparent;
            cursor: text;
            color: #1a264f;
        }

        .info-value:empty::before {
            content: '点击输入';
            color: #b8c6e0;
            font-weight: 400;
        }
        .info-value:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(60, 80, 160, 0.25);
            box-shadow: 0 0 0 3px rgba(60, 80, 160, 0.06);
        }

        /* ===== 可编辑内容块 ===== */
        .editable-block {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            font-family: inherit;
            line-height: 1.7;
            color: #1a264f;
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid rgba(60, 80, 160, 0.15);
            border-radius: 12px;
            outline: none;
            min-height: 64px;
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.02);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s, color 0.3s;
            word-break: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
            overflow: hidden;
            resize: none;
            cursor: text;
        }

        .editable-block:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 4px rgba(60, 80, 160, 0.10), inset 0 1px 4px rgba(0, 0, 0, 0.02);
            background: rgba(255, 255, 255, 0.8);
        }

        .editable-block:empty::before {
            content: '点击输入';
            color: #b0bedb;
            font-weight: 400;
            font-size: 14px;
        }

        /* ===== 右列 — 合并卡片 ===== */
        .merged-card .merged-section {
            padding: 6px 0;
        }
        .merged-card .merged-section+.merged-section {
            border-top: 1px solid rgba(60, 80, 140, 0.08);
            padding-top: 12px;
            margin-top: 4px;
        }
        .merged-card .section-label {
            font-size: 14px;
            font-weight: 600;
            color: #1a264f;
            display: block;
            margin-bottom: 8px;
            transition: color 0.3s;
        }

        /* 游玩方式 */
        .play-style-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
        }

        .option-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 12px 4px 10px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid transparent;
            transition: all 0.2s ease;
            user-select: none;
            font-weight: 500;
            font-size: 14px;
            color: #3d4a6b;
        }

        .option-chip:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(60, 80, 160, 0.15);
        }

        .option-chip .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #d0d8e8;
            flex-shrink: 0;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .option-chip .dot::after {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: transparent;
            transition: all 0.25s ease;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .option-chip.active {
            background: rgba(60, 80, 160, 0.08);
            border-color: rgba(60, 80, 160, 0.25);
            color: #1a264f;
        }

        .option-chip.active .dot {
            background: #4a6cf7;
            box-shadow: 0 2px 8px rgba(60, 80, 160, 0.30);
        }

        .option-chip.active .dot::after {
            content: '✓';
            width: auto;
            height: auto;
            border-radius: 0;
            background: transparent;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
            position: static;
            transform: none;
        }

        /* 表单行 */
        .form-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px 12px;
            padding: 2px 0;
        }

        .form-row .label {
            font-size: 14px;
            font-weight: 600;
            color: #1a264f;
            white-space: nowrap;
            transition: color 0.3s;
        }

        .form-row .input-text {
            padding: 6px 12px;
            font-size: 14px;
            font-family: inherit;
            border: 1.5px solid rgba(60, 80, 160, 0.15);
            border-radius: 10px;
            outline: none;
            background: rgba(255, 255, 255, 0.5);
            transition: border-color 0.2s, box-shadow 0.2s, color 0.3s;
            color: #1a264f;
            width: 64px;
            text-align: center;
            font-weight: 500;
            line-height: 1.5;
            height: auto;
        }

        .form-row .input-text:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 4px rgba(60, 80, 160, 0.08);
            background: rgba(255, 255, 255, 0.8);
        }

        .form-row .input-text.number {
            width: 56px;
            -moz-appearance: textfield;
        }
        .form-row .input-text.number::-webkit-outer-spin-button,
        .form-row .input-text.number::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* 招募PL人数 section（切换时隐藏） */
        #plCountSection {
            transition: opacity 0.3s ease, max-height 0.3s ease, padding 0.3s ease, margin 0.3s ease;
            overflow: hidden;
            max-height: 120px;
            opacity: 1;
            padding: 6px 0;
        }
        #plCountSection.hidden {
            max-height: 0;
            opacity: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
            pointer-events: none;
        }

        /* 有偿招募 */
        .pay-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 14px;
            padding: 2px 0;
        }

        .pay-group .label {
            font-size: 14px;
            font-weight: 600;
            color: #1a264f;
            white-space: nowrap;
            transition: color 0.3s;
        }

        .pay-options {
            display: flex;
            gap: 6px 12px;
            flex-wrap: wrap;
        }

        .option-chip.small {
            padding: 3px 12px 3px 8px;
            font-size: 13px;
        }
        .option-chip.small .dot {
            width: 14px;
            height: 14px;
        }
        .option-chip.small .dot::after {
            width: 6px;
            height: 6px;
        }
        .option-chip.small.active .dot::after {
            font-size: 10px;
        }

        /* 报价文本框 */
        .quote-wrap {
            margin-top: 6px;
            padding-left: 2px;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                opacity 0.3s ease,
                margin 0.3s ease;
        }

        .quote-wrap.open {
            max-height: 200px;
            opacity: 1;
            margin-top: 12px;
        }

        .quote-wrap .quote-label {
            font-size: 13px;
            font-weight: 600;
            color: #4a6cf7;
            display: block;
            margin-bottom: 6px;
            transition: color 0.3s;
        }

        .quote-wrap .editable-block {
            min-height: 44px;
            padding: 10px 14px;
            font-size: 13px;
        }

        /* ===== GM / 要求 / 事前须知 大文本框 ===== */
        .big-textarea-block .block-title {
            margin-bottom: 10px;
        }

        /* ============================================================ */
        /* ===== 移动端适配：单列布局 ===== */
        /* ============================================================ */
        @media (max-width: 720px) {
            body {
                padding: 12px 8px;
            }
            .app {
                padding: 16px 12px 20px;
                border-radius: 28px;
            }
            .grid {
                grid-template-columns: 1fr !important;
                gap: 20px;
            }
            .col {
                gap: 16px;
            }
            .toolbar-card {
                padding: 8px 12px;
                gap: 8px 10px;
                justify-content: center;
                min-height: 44px;
                border-radius: 16px;
            }
            .toolbar-btn {
                font-size: 12px;
                padding: 5px 12px;
            }
            .app-header h1 {
                font-size: 22px;
                letter-spacing: 3px;
            }
            .block {
                padding: 14px 14px 16px;
                border-radius: 14px;
            }
            .info-grid {
                padding-left: 12px;
            }
            .info-label {
                width: 100px;
                font-size: 13px;
            }
            .info-value {
                font-size: 13px;
            }
            .mod-title {
                font-size: 18px;
            }
            .block-title {
                font-size: 15px;
                margin-bottom: 10px;
            }
            .editable-block {
                font-size: 13px;
                padding: 10px 14px;
                min-height: 52px;
                border-radius: 10px;
            }
            .option-chip {
                font-size: 13px;
                padding: 4px 10px 4px 8px;
                gap: 6px;
            }
            .option-chip .dot {
                width: 14px;
                height: 14px;
            }
            .option-chip .dot::after {
                width: 6px;
                height: 6px;
            }
            .option-chip.active .dot::after {
                font-size: 9px;
            }
            .form-row .label {
                font-size: 13px;
            }
            .form-row .input-text {
                font-size: 13px;
                padding: 4px 10px;
                width: 56px;
                line-height: 1.5;
            }
            .form-row .input-text.number {
                width: 50px;
            }
            .pay-group .label {
                font-size: 13px;
            }
            .pay-options {
                gap: 4px 8px;
            }
            .option-chip.small {
                font-size: 12px;
                padding: 2px 10px 2px 8px;
            }
            .option-chip.small .dot {
                width: 12px;
                height: 12px;
            }
            .quote-wrap .quote-label {
                font-size: 12px;
            }
            .quote-wrap .editable-block {
                font-size: 12px;
                min-height: 40px;
                padding: 8px 12px;
            }
            .big-textarea-block .block-title {
                font-size: 15px;
            }
            .merged-card .section-label {
                font-size: 14px;
            }
            .image-upload-wrapper .upload-placeholder {
                font-size: 14px;
            }
            .image-upload-wrapper .upload-placeholder .arrow-icon {
                font-size: 22px;
            }
            #plCountSection {
                max-height: 100px;
            }
            #plCountSection.hidden {
                max-height: 0;
            }
            /* 公告栏适应 */
            #announcementBox {
                padding: 22px 20px 20px;
                max-width: 94%;
                border-radius: 18px;
            }
            #announcementBox .announce-title {
                font-size: 17px;
            }
            #announcementBox .announce-body {
                font-size: 14px;
                line-height: 1.6;
            }
            #announcementBox .close-btn {
                top: 12px;
                right: 14px;
                font-size: 20px;
            }
        }

        @media (max-width: 420px) {
            body {
                padding: 8px 4px;
            }
            .app {
                padding: 12px 8px 16px;
                border-radius: 20px;
            }
            .grid {
                gap: 14px;
            }
            .col {
                gap: 12px;
            }
            .toolbar-card {
                padding: 6px 8px;
                gap: 6px 8px;
                min-height: 36px;
                border-radius: 12px;
            }
            .toolbar-btn {
                font-size: 11px;
                padding: 4px 10px;
            }
            .app-header h1 {
                font-size: 18px;
                letter-spacing: 2px;
            }
            .block {
                padding: 10px 10px 12px;
                border-radius: 12px;
            }
            .info-grid {
                padding-left: 8px;
            }
            .info-label {
                width: 80px;
                font-size: 12px;
            }
            .info-value {
                font-size: 12px;
            }
            .mod-title {
                font-size: 16px;
            }
            .block-title {
                font-size: 14px;
            }
            .editable-block {
                font-size: 12px;
                padding: 8px 12px;
                min-height: 44px;
                border-radius: 8px;
            }
            .option-chip {
                font-size: 12px;
                padding: 3px 8px 3px 6px;
                gap: 6px;
            }
            .option-chip .dot {
                width: 12px;
                height: 12px;
            }
            .form-row .input-text {
                font-size: 12px;
                padding: 4px 6px;
                width: 44px;
                line-height: 1.5;
            }
            .form-row .input-text.number {
                width: 40px;
            }
            .pay-group .label {
                font-size: 12px;
            }
            .option-chip.small {
                font-size: 11px;
                padding: 2px 8px 2px 6px;
            }
            .option-chip.small .dot {
                width: 10px;
                height: 10px;
            }
            .quote-wrap .editable-block {
                font-size: 12px;
                min-height: 36px;
                padding: 6px 10px;
            }
            .image-upload-wrapper .upload-placeholder {
                font-size: 13px;
            }
            .image-upload-wrapper .upload-placeholder .arrow-icon {
                font-size: 20px;
            }
            #announcementBox {
                padding: 16px 14px 16px;
                border-radius: 14px;
            }
            #announcementBox .announce-title {
                font-size: 15px;
            }
            #announcementBox .announce-body {
                font-size: 13px;
                line-height: 1.5;
            }
            #announcementBox .close-btn {
                top: 10px;
                right: 12px;
                font-size: 18px;
            }
        }

        /* ===== 工具 ===== */
        .mt-1 {
            margin-top: 4px;
        }
        .mb-1 {
            margin-bottom: 4px;
        }
        .flex-col {
            display: flex;
            flex-direction: column;
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.02);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(60, 80, 160, 0.18);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(60, 80, 160, 0.32);
        }

        /* ===== 选中动画 ===== */
        .option-chip.active {
            animation: pop 0.25s ease;
        }

        @keyframes pop {
            0% {
                transform: scale(0.96);
            }
            50% {
                transform: scale(1.04);
            }
            100% {
                transform: scale(1);

        /* ===== 图片上传过渡 ===== */
        .image-upload-wrapper {

        /* ============================================================ */
        /* ===== 富文本悬浮工具栏 ===== */

        #formatToolbar .fmt-btn {

            font-size: 15px;

            align-items: center;
            justify-content: center;

            font-family: 'Inter', -apple-system, sans-serif;

        }

        #formatToolbar .fmt-btn:hover {
            background: rgba(60, 80, 160, 0.08);
        }
        #formatToolbar .fmt-btn:active {

        }

        #formatToolbar .fmt-btn.bold {
            font-weight: 700;
        }
        #formatToolbar .fmt-btn.italic {

        /* ---- 颜色选择器按钮（圆形） ---- */

            width: 28px;

        #formatToolbar .fmt-btn.color-picker-btn:hover {

        #formatToolbar .fmt-btn.color-picker-btn .color-preview {

        /* ---- 自定义颜色选择器弹出面板 ---- */
        #customColorPicker {
            position: fixed;
            z-index: 10001;
            display: none;

        }

        #customColorPicker.show {
            display: block;

        }

        @keyframes pickerFadeIn {

                opacity: 0;
                transform: scale(0.96) translateY(4px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);

        #customColorPicker .picker-header {
            display: flex;

        #customColorPicker .picker-header .close-picker {

        #customColorPicker .color-grid {
            display: grid;

            margin-bottom: 10px;
        }

        #customColorPicker .color-swatch {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.15s ease;

        #customColorPicker .color-swatch:hover {

        #customColorPicker .picker-bottom {

        #customColorPicker .picker-bottom input[type="color"] {

        #customColorPicker .picker-bottom input[type="color"]::-webkit-color-swatch-wrapper {

        #customColorPicker .picker-bottom input[type="color"]::-webkit-color-swatch {

        #customColorPicker .picker-bottom .hex-input {

        /* ============================================================ */

        #announcementOverlay {

        #announcementBox .close-btn {

    </style>
</head>

<body>

    <!-- ===== 悬浮公告栏 ===== -->
    <div id="announcementOverlay">
        <div id="announcementBox">
            <button class="close-btn" id="closeAnnouncement" title="关闭公告">✕</button>
            <span class="announce-icon">📢</span>
            <div class="announce-title">更新公告</div>
            <div class="announce-body">
                修正了一部分字体不显示的bug，增加了文字编辑工具，选中文字后可以将文字加粗/斜体/改色。
            </div>
            <div class="announce-footer">— 点击右上角关闭 —</div>
        </div>
    </div>

    <!-- ===== 富文本悬浮工具栏 ===== -->
    <div id="formatToolbar" class="">
        <div class="toolbar-group">
            <button class="fmt-btn bold" data-cmd="bold" title="加粗">
                <span>B</span>
                <span class="tooltip">加粗</span>
            </button>
            <button class="fmt-btn italic" data-cmd="italic" title="斜体">
                <span>I</span>
                <span class="tooltip">斜体</span>
            </button>
            <!-- 颜色选择器（缩小圆形按钮） -->
            <button class="fmt-btn color-picker-btn" id="colorPickerBtn" title="文字颜色">
                <span class="color-preview" id="colorPreview" style="background:#1a264f;"></span>
                <span class="tooltip">文字颜色</span>
            </button>
        </div>
    </div>

    <!-- ===== 自定义颜色选择器弹出面板 ===== -->
    <div id="customColorPicker">
        <div class="picker-header">
            <span>选择颜色</span>
            <button class="close-picker" id="closeColorPicker">✕</button>
        </div>
        <div class="color-grid" id="colorGrid">
            <!-- 预设颜色由 JS 动态生成 -->
        </div>
        <div class="picker-bottom">
            <label>自定义</label>
            <input type="color" id="pickerColorInput" value="#1a264f" />
            <input type="text" class="hex-input" id="pickerHexInput" placeholder="#000000" maxlength="7" />
        </div>
    </div>

    <!-- ===== 主容器 ===== -->
    <div class="app" id="appContainer">

        <!-- ===== 工具栏卡片 ===== -->
        <div class="toolbar-card" id="toolbarCard">
            <button class="toolbar-btn btn-toggle" id="toggleModeBtn">切换到招募GM</button>
            <button class="toolbar-btn btn-export" id="exportBtn">📷 导出图片</button>
        </div>

        <!-- ===== 顶部标题 ===== -->
        <header class="app-header">
            <div class="title-wrap">
                <h1>TRPG 招募</h1>
            </div>
        </header>

        <!-- ===== 双列内容（移动端自动变为单列） ===== -->
        <div class="grid">

            <!-- ===== 左列：模组信息 ===== -->
            <div class="col col-left">

                <div class="mod-title">模组信息</div>

                <!-- 图片上传 -->
                <div class="image-upload-wrapper" id="imageUploader">
                    <div class="upload-placeholder" id="uploadPlaceholder">
                        <span class="arrow-icon">↑</span>
                        <span>点击上传图片</span>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" />
                </div>

                <!-- 五个信息标签 -->
                <div class="info-grid">
                    <div class="info-row">
                        <span class="info-label">模组名：</span>
                        <span class="info-value" contenteditable="true"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">规则：</span>
                        <span class="info-value" contenteditable="true"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">舞台：</span>
                        <span class="info-value" contenteditable="true"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">人数：</span>
                        <span class="info-value" contenteditable="true"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">游玩时间：</span>
                        <span class="info-value" contenteditable="true"></span>
                    </div>
                </div>

                <!-- 模组简介 -->
                <div class="textarea-wrap block">
                    <div class="block-title">模组简介</div>
                    <div class="editable-block" contenteditable="true" role="textbox" aria-multiline="true"></div>
                </div>

            </div>

            <!-- ===== 右列：招募详情（移动端会接到左列下方） ===== -->
            <div class="col col-right">

                <!-- 合并卡片：游玩方式 + 招募PL人数 + 有偿招募 -->
                <div class="block merged-card">

                    <!-- 游玩方式 -->
                    <div class="merged-section">
                        <span class="section-label">游玩方式</span>
                        <div class="play-style-group">
                            <div class="option-chip active" data-group="play" data-value="text">
                                <span class="dot"></span> 文字团
                            </div>
                            <div class="option-chip" data-group="play" data-value="voice">
                                <span class="dot"></span> 语音团
                            </div>
                            <div class="option-chip" data-group="play" data-value="face">
                                <span class="dot"></span> 面团
                            </div>
                        </div>
                    </div>

                    <!-- 招募PL人数（切换时隐藏） -->
                    <div class="merged-section" id="plCountSection">
                        <div class="form-row">
                            <span class="label">招募PL人数</span>
                            <input class="input-text number" type="number" min="1" max="10" value="4" id="playerCount" />
                            <span style="font-size:14px;color:#6b7c9f;">人</span>
                        </div>
                    </div>

                    <!-- 有偿招募 -->
                    <div class="merged-section">
                        <div class="pay-group">
                            <span class="label">是否为有偿招募</span>
                            <div class="pay-options">
                                <div class="option-chip small active" data-group="pay" data-value="yes">
                                    <span class="dot"></span> 是
                                </div>
                                <div class="option-chip small" data-group="pay" data-value="no">
                                    <span class="dot"></span> 否
                                </div>
                            </div>
                        </div>
                        <!-- 报价 / 预算 -->
                        <div class="quote-wrap open" id="quoteWrap">
                            <span class="quote-label" id="quoteLabel">报价</span>
                            <div class="editable-block" contenteditable="true" role="textbox" aria-multiline="true"></div>
                        </div>
                    </div>

                </div>

                <!-- ===== 事前须知 ===== -->
                <div class="big-textarea-block block">
                    <div class="block-title">事前须知</div>
                    <div class="editable-block" contenteditable="true" role="textbox" aria-multiline="true"></div>
                </div>

                <!-- ===== GM可以做到 / PL可以做到 (切换) ===== -->
                <div class="big-textarea-block block" id="gmBlock">
                    <div class="block-title" id="gmTitle">GM 可以做到</div>
                    <div class="editable-block" contenteditable="true" role="textbox" aria-multiline="true"></div>
                </div>

                <!-- ===== 对PL的要求 / 对GM的要求 (切换) ===== -->
                <div class="big-textarea-block block" id="plRequirementBlock">
                    <div class="block-title" id="plRequirementTitle">对 PL 的要求</div>
                    <div class="editable-block" contenteditable="true" role="textbox" aria-multiline="true"></div>
                </div>

            </div>
            <!-- /右列 -->

        </div>
        <!-- /grid -->

    </div>
    <!-- /app -->

    <script>
        (function() {
            'use strict';

            // ============================================================
            // 0. 公告栏控制
            // ============================================================
            const overlay = document.getElementById('announcementOverlay');
            const closeAnnounceBtn = document.getElementById('closeAnnouncement');

            function showAnnouncement() {
                overlay.classList.add('show');
            }

            function hideAnnouncement() {
                overlay.classList.remove('show');
            }

            closeAnnounceBtn.addEventListener('click', hideAnnouncement);

            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    hideAnnouncement();
                }
            });

            window.addEventListener('load', function() {
                setTimeout(showAnnouncement, 300);
            });

            // ============================================================
            // 1. 自动调整可编辑块高度
            // ============================================================
            const editableBlocks = document.querySelectorAll('.editable-block');
            const infoValues = document.querySelectorAll('.info-value');

            function resizeEditable(el) {
                el.style.height = 'auto';
                el.style.height = el.scrollHeight + 'px';
            }

            function resizeAll() {
                [...editableBlocks, ...infoValues].forEach(function(el) {
                    resizeEditable(el);
                });
            }
            resizeAll();

            [...editableBlocks, ...infoValues].forEach(function(el) {
                el.addEventListener('input', function() {
                    resizeEditable(this);
                });
                el.addEventListener('paste', function() {
                    setTimeout(function() {
                        resizeEditable(el);
                    }, 10);
                });
                el.addEventListener('drop', function() {
                    setTimeout(function() {
                        resizeEditable(el);
                    }, 10);
                });
            });

            let resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    resizeAll();
                }, 150);
            });

            // ============================================================
            // 2. 图片上传
            // ============================================================
            const uploader = document.getElementById('imageUploader');
            const fileInput = document.getElementById('imageInput');
            const placeholder = document.getElementById('uploadPlaceholder');

            uploader.addEventListener('click', function() {
                fileInput.click();
            });

            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const dataUrl = ev.target.result;
                    uploader.style.backgroundImage = 'url(' + dataUrl + ')';
                    uploader.classList.add('has-image');
                    placeholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            });

            // ============================================================
            // 3. 选项芯片 (点击切换)
            // ============================================================
            const chips = document.querySelectorAll('.option-chip');

            chips.forEach(function(chip) {
                chip.addEventListener('click', function(e) {
                    const group = this.dataset.group;
                    if (!group) return;

                    const siblings = document.querySelectorAll('.option-chip[data-group="' + group + '"]');
                    siblings.forEach(function(sib) {
                        sib.classList.remove('active');
                    });
                    this.classList.add('active');

                    if (group === 'pay') {
                        const quoteWrap = document.getElementById('quoteWrap');
                        const isYes = this.dataset.value === 'yes';
                        if (isYes) {
                            quoteWrap.classList.add('open');
                            setTimeout(function() {
                                const block = quoteWrap.querySelector('.editable-block');
                                if (block) resizeEditable(block);
                            }, 50);
                        } else {
                            quoteWrap.classList.remove('open');
                        }
                    }
                });
            });

            // ============================================================
            // 4. 初始化状态
            // ============================================================
            let payActive = document.querySelector('.option-chip[data-group="pay"].active');
            if (!payActive) {
                const yesChip = document.querySelector('.option-chip[data-group="pay"][data-value="yes"]');
                if (yesChip) {
                    yesChip.classList.add('active');
                }
            }
            const quoteWrap = document.getElementById('quoteWrap');
            const activePay = document.querySelector('.option-chip[data-group="pay"].active');
            if (activePay && activePay.dataset.value === 'yes') {
                quoteWrap.classList.add('open');
            } else {
                quoteWrap.classList.remove('open');
            }

            const playActive = document.querySelector('.option-chip[data-group="play"].active');
            if (!playActive) {
                const first = document.querySelector('.option-chip[data-group="play"]');
                if (first) first.classList.add('active');
            }

            // ============================================================
            // 5. 数字输入限制
            // ============================================================
            const numberInput = document.getElementById('playerCount');
            if (numberInput) {
                numberInput.addEventListener('input', function() {
                    this.value = this.value.replace(/[^0-9]/g, '');
                    let val = parseInt(this.value, 10);
                    if (val < 1 && this.value !== '') {
                        this.value = '1';
                    }
                    if (val > 10) {
                        this.value = '10';
                    }
                });
                numberInput.addEventListener('blur', function() {
                    if (this.value === '' || isNaN(parseInt(this.value, 10))) {
                        this.value = '4';
                    }
                    let val = parseInt(this.value, 10);
                    if (val < 1) this.value = '1';
                    if (val > 10) this.value = '10';
                });
            }

            // ============================================================
            // 6. 切换模式（招募PL / 招募GM）
            // ============================================================
            let currentMode = 'pl';

            const toggleBtn = document.getElementById('toggleModeBtn');
            const plCountSection = document.getElementById('plCountSection');
            const gmTitle = document.getElementById('gmTitle');
            const plRequirementTitle = document.getElementById('plRequirementTitle');
            const quoteLabel = document.getElementById('quoteLabel');

            function updateMode(mode) {
                currentMode = mode;
                if (mode === 'gm') {
                    plCountSection.classList.add('hidden');
                    gmTitle.textContent = 'PL 可以做到';
                    plRequirementTitle.textContent = '对 GM 的要求';
                    quoteLabel.textContent = '预算';
                    toggleBtn.textContent = '切换到招募PL';
                    toggleBtn.classList.add('active-gm');
                } else {
                    plCountSection.classList.remove('hidden');
                    gmTitle.textContent = 'GM 可以做到';
                    plRequirementTitle.textContent = '对 PL 的要求';
                    quoteLabel.textContent = '报价';
                    toggleBtn.textContent = '切换到招募GM';
                    toggleBtn.classList.remove('active-gm');
                }
                setTimeout(function() {
                    resizeAll();
                }, 100);
            }

            toggleBtn.addEventListener('click', function() {
                if (currentMode === 'pl') {
                    updateMode('gm');
                } else {
                    updateMode('pl');
                }
            });

            updateMode('pl');

            // ============================================================
            // 7. 粘贴统一格式（不保留原格式）
            // ============================================================
            const editableElements = document.querySelectorAll('[contenteditable="true"]');
            editableElements.forEach(function(el) {
                el.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const text = (e.clipboardData || window.clipboardData).getData('text/plain');
                    document.execCommand('insertText', false, text);
                    this.dispatchEvent(new Event('input'));
                });
            });

            // ============================================================
            // 8. 富文本悬浮工具栏（加粗、斜体、颜色）
            // ============================================================
            const toolbar = document.getElementById('formatToolbar');
            const colorPreview = document.getElementById('colorPreview');
            const colorPickerBtn = document.getElementById('colorPickerBtn');
            const customPicker = document.getElementById('customColorPicker');
            const closePickerBtn = document.getElementById('closeColorPicker');
            const colorGrid = document.getElementById('colorGrid');
            const pickerColorInput = document.getElementById('pickerColorInput');
            const pickerHexInput = document.getElementById('pickerHexInput');

            let savedRange = null;
            let toolbarVisible = false;
            let pickerVisible = false;
            let currentColor = '#1a264f';
            let isApplyingColor = false;

            // 预设颜色
            const presetColors = [
                '#1a264f', '#4a6cf7', '#e74c3c', '#e67e22', '#f1c40f',
                '#2ecc71', '#1abc9c', '#3498db', '#9b59b6', '#e84393',
                '#2d3436', '#636e72', '#b2bec3', '#fd79a8', '#00b894',
                '#0984e3', '#6c5ce7', '#fdcb6e', '#e17055', '#00cec9'
            ];

            // 生成颜色网格
            function renderColorGrid(selectedColor) {
                colorGrid.innerHTML = '';
                presetColors.forEach(function(color) {
                    const swatch = document.createElement('div');
                    swatch.className = 'color-swatch';
                    if (color === selectedColor) {
                        swatch.classList.add('active');
                    }
                    swatch.style.background = color;
                    swatch.dataset.color = color;
                    swatch.addEventListener('click', function(e) {
                        e.preventDefault();
                        applyColor(color);
                    });
                    colorGrid.appendChild(swatch);
                });
            }

            // 应用颜色到选中文字（核心函数，保持选区稳定）
            function applyColor(color) {
                if (isApplyingColor) return;
                isApplyingColor = true;

                try {
                    currentColor = color;
                    colorPreview.style.background = color;
                    pickerColorInput.value = color;
                    pickerHexInput.value = color;

                    // 更新网格选中状态
                    document.querySelectorAll('.color-swatch').forEach(function(el) {
                        el.classList.toggle('active', el.dataset.color === color);
                    });

                    // 恢复选区
                    restoreSelection();

                    // 检查选区是否有效
                    const sel = window.getSelection();
                    if (sel && !sel.isCollapsed && sel.rangeCount > 0) {
                        try {
                            document.execCommand('foreColor', false, color);
                        } catch (e) {
                            console.warn('execCommand foreColor failed:', e);
                        }
                    }

                    // 重新保存选区
                    saveSelection();

                } finally {
                    isApplyingColor = false;
                }
            }

            // 显示颜色选择器
            function showColorPicker(anchorRect) {
                const pickerWidth = customPicker.offsetWidth || 220;
                const pickerHeight = customPicker.offsetHeight || 260;
                const gap = 8;

                let left = anchorRect.left + (anchorRect.width - pickerWidth) / 2;
                let top = anchorRect.top - pickerHeight - gap;

                if (top < 10) {
                    top = anchorRect.bottom + gap;
                }

                if (left < 10) left = 10;
                if (left + pickerWidth > window.innerWidth - 10) {
                    left = window.innerWidth - pickerWidth - 10;
                }
                if (top + pickerHeight > window.innerHeight - 10) {
                    top = window.innerHeight - pickerHeight - 10;
                }
                if (top < 10) top = 10;

                customPicker.style.left = left + 'px';
                customPicker.style.top = top + 'px';
                customPicker.classList.add('show');
                pickerVisible = true;
            }

            // 隐藏颜色选择器
            function hideColorPicker() {
                customPicker.classList.remove('show');
                pickerVisible = false;
            }

            // 切换颜色选择器
            function toggleColorPicker(anchorRect) {
                if (pickerVisible) {
                    hideColorPicker();
                } else {
                    saveSelection();
                    renderColorGrid(currentColor);
                    pickerColorInput.value = currentColor;
                    pickerHexInput.value = currentColor;
                    showColorPicker(anchorRect);
                }
            }

            // 检查选区是否在可编辑区域内
            function isInEditable(sel) {
                if (!sel || sel.rangeCount === 0) return false;
                const range = sel.getRangeAt(0);
                if (range.collapsed) return false;
                let node = range.commonAncestorContainer;
                if (node.nodeType === Node.TEXT_NODE) {
                    node = node.parentNode;
                }
                while (node) {
                    if (node.classList && (node.classList.contains('info-value') || node.classList.contains(
                            'editable-block'))) {
                        return true;
                    }
                    node = node.parentNode;
                }
                return false;
            }

            // 获取选区边界矩形
            function getSelectionRect(sel) {
                if (!sel || sel.rangeCount === 0) return null;
                const range = sel.getRangeAt(0);
                if (range.collapsed) return null;
                const rects = range.getClientRects();
                if (rects.length === 0) return null;
                let left = Infinity,
                    right = -Infinity,
                    top = Infinity,
                    bottom = -Infinity;
                for (let i = 0; i < rects.length; i++) {
                    const r = rects[i];
                    if (r.left < left) left = r.left;
                    if (r.right > right) right = r.right;
                    if (r.top < top) top = r.top;
                    if (r.bottom > bottom) bottom = r.bottom;
                }
                return { left, right, top, bottom, width: right - left, height: bottom - top };
            }

            // 显示工具栏
            function showToolbar(rect) {
                const toolbarWidth = toolbar.offsetWidth || 140;
                const toolbarHeight = 48;
                const gap = 10;

                let top = rect.top - toolbarHeight - gap;
                let left = rect.left + (rect.width - toolbarWidth) / 2;

                if (top < 10) {
                    top = rect.bottom + gap;
                }

                const maxLeft = window.innerWidth - toolbarWidth - 10;
                if (left < 10) left = 10;
                if (left > maxLeft) left = maxLeft;

                toolbar.style.left = left + 'px';
                toolbar.style.top = top + 'px';
                toolbar.classList.add('show');
                toolbarVisible = true;
            }

            // 隐藏工具栏（同时隐藏颜色选择器）
            function hideToolbar() {
                toolbar.classList.remove('show');
                toolbarVisible = false;
                hideColorPicker();
                savedRange = null;
            }

            // 保存选区
            function saveSelection() {
                const sel = window.getSelection();
                if (sel && sel.rangeCount > 0 && !sel.isCollapsed) {
                    try {
                        savedRange = sel.getRangeAt(0).cloneRange();
                    } catch (e) {
                        savedRange = null;
                    }
                } else {
                    savedRange = null;
                }
            }

            // 恢复选区
            function restoreSelection() {
                if (savedRange) {
                    try {
                        const sel = window.getSelection();
                        sel.removeAllRanges();
                        sel.addRange(savedRange);
                    } catch (e) {
                        console.warn('恢复选区失败:', e);
                    }
                }
            }

            // 处理选区变化
            function handleSelectionChange() {
                const sel = window.getSelection();
                if (!sel || sel.rangeCount === 0 || sel.isCollapsed) {
                    if (!pickerVisible) {
                        hideToolbar();
                    }
                    return;
                }

                if (!isInEditable(sel)) {
                    if (!pickerVisible) {
                        hideToolbar();
                    }
                    return;
                }

                const rect = getSelectionRect(sel);
                if (!rect || rect.width < 2 || rect.height < 2) {
                    if (!pickerVisible) {
                        hideToolbar();
                    }
                    return;
                }

                savedRange = sel.getRangeAt(0).cloneRange();
                showToolbar(rect);
            }

            // 监听选区变化
            let selectionTimeout = null;
            document.addEventListener('selectionchange', function() {
                clearTimeout(selectionTimeout);
                selectionTimeout = setTimeout(function() {
                    handleSelectionChange();
                }, 50);
            });

            // 监听滚动重新定位
            let scrollTimeout = null;
            window.addEventListener('scroll', function() {
                if (toolbarVisible) {
                    clearTimeout(scrollTimeout);
                    scrollTimeout = setTimeout(function() {
                        const sel = window.getSelection();
                        if (sel && !sel.isCollapsed && isInEditable(sel)) {
                            const rect = getSelectionRect(sel);
                            if (rect && rect.width >= 2 && rect.height >= 2) {
                                showToolbar(rect);
                            } else {
                                if (!pickerVisible) hideToolbar();
                            }
                        } else {
                            if (!pickerVisible) hideToolbar();
                        }
                    }, 80);
                }
            });

            // 阻止工具栏和颜色选择器点击导致失去选区
            toolbar.addEventListener('mousedown', function(e) {
                e.preventDefault();
            });

            customPicker.addEventListener('mousedown', function(e) {
                e.preventDefault();
            });

            // 格式按钮（加粗、斜体）
            toolbar.addEventListener('click', function(e) {
                const btn = e.target.closest('.fmt-btn');
                if (!btn) return;
                const cmd = btn.dataset.cmd;
                if (cmd) {
                    restoreSelection();
                    document.execCommand(cmd, false, null);
                    document.activeElement && document.activeElement.focus();
                    saveSelection();
                    setTimeout(function() {
                        handleSelectionChange();
                    }, 20);
                }
            });

            // ---- 颜色选择器按钮点击 ----
            colorPickerBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();

                const rect = this.getBoundingClientRect();
                const anchorRect = {
                    left: rect.left,
                    right: rect.right,
                    top: rect.top,
                    bottom: rect.bottom,
                    width: rect.width,
                    height: rect.height
                };

                if (pickerVisible) {
                    hideColorPicker();
                    return;
                }

                saveSelection();
                renderColorGrid(currentColor);
                pickerColorInput.value = currentColor;
                pickerHexInput.value = currentColor;
                showColorPicker(anchorRect);
            });

            // ---- 关闭颜色选择器 ----
            closePickerBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                hideColorPicker();
                setTimeout(function() {
                    handleSelectionChange();
                }, 50);
            });

            // ---- 自定义颜色输入（颜色选择器 input） ----
            pickerColorInput.addEventListener('input', function(e) {
                e.stopPropagation();
                const color = this.value;
                pickerHexInput.value = color;
                document.querySelectorAll('.color-swatch').forEach(function(el) {
                    el.classList.toggle('active', el.dataset.color === color);
                });
                applyColor(color);
            });

            // ---- 自定义颜色输入（十六进制文本输入） ----
            pickerHexInput.addEventListener('input', function(e) {
                e.stopPropagation();
                let val = this.value.trim();
                if (val && !val.startsWith('#')) {
                    val = '#' + val;
                }
                if (val.match(/^#[0-9a-fA-F]{6}$/)) {
                    pickerColorInput.value = val;
                    document.querySelectorAll('.color-swatch').forEach(function(el) {
                        el.classList.toggle('active', el.dataset.color === val);
                    });
                    applyColor(val);
                }
            });

            pickerHexInput.addEventListener('blur', function() {
                let val = this.value.trim();
                if (!val.match(/^#[0-9a-fA-F]{6}$/)) {
                    this.value = currentColor;
                }
            });

            pickerHexInput.addEventListener('focus', function() {
                if (this.value && !this.value.startsWith('#')) {
                    this.value = '#' + this.value;
                }
            });

            // ---- 点击颜色选择器外部关闭 ----
            document.addEventListener('mousedown', function(e) {
                if (pickerVisible) {
                    const target = e.target;
                    if (!customPicker.contains(target) && target !== colorPickerBtn && !colorPickerBtn.contains(
                            target)) {
                        hideColorPicker();
                        setTimeout(function() {
                            handleSelectionChange();
                        }, 50);
                    }
                }
            });

            // 点击页面其他地方隐藏工具栏（当颜色选择器未打开时）
            document.addEventListener('mousedown', function(e) {
                if (toolbarVisible && !pickerVisible && !toolbar.contains(e.target)) {
                    const target = e.target;
                    let inEditable = false;
                    let node = target;
                    while (node) {
                        if (node.classList && (node.classList.contains('info-value') || node.classList.contains(
                                'editable-block'))) {
                            inEditable = true;
                            break;
                        }
                        node = node.parentNode;
                    }
                    if (!inEditable) {
                        hideToolbar();
                    }
                }
            });

            // ============================================================
            // 9. 导出图片（四周留白 + 修复输入框文字偏移）
            // ============================================================
            const exportBtn = document.getElementById('exportBtn');
            const appContainer = document.getElementById('appContainer');
            const toolbarCard = document.getElementById('toolbarCard');

            if (typeof html2canvas === 'undefined') {
                exportBtn.textContent = '加载中...';
                exportBtn.disabled = true;
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
                script.onload = function() {
                    exportBtn.textContent = '📷 导出图片';
                    exportBtn.disabled = false;
                };
                script.onerror = function() {
                    exportBtn.textContent = '加载失败';
                    alert('html2canvas 库加载失败，请检查网络连接后刷新页面。');
                };
                document.head.appendChild(script);
            }

            exportBtn.addEventListener('click', function() {
                const btn = this;
                if (btn.disabled) return;

                if (typeof html2canvas === 'undefined') {
                    alert('导出库尚未加载完成，请稍后重试。');
                    return;
                }

                hideToolbar();
                hideColorPicker();
                resizeAll();

                requestAnimationFrame(function() {
                    setTimeout(function() {
                        const originalText = btn.textContent;
                        btn.textContent = '导出中...';
                        btn.disabled = true;

                        const width = appContainer.scrollWidth;
                        const height = appContainer.scrollHeight;

                        html2canvas(appContainer, {
                            scale: 2,
                            useCORS: true,
                            allowTaint: true,
                            backgroundColor: '#f2f5fa',
                            logging: false,
                            width: width,
                            height: height,
                            windowWidth: width,
                            windowHeight: height,
                            ignoreElements: function(element) {
                                if (element === toolbarCard || toolbarCard.contains(element)) {
                                    return true;
                                }
                                return false;
                            },
                            onclone: function(clonedDoc) {
                                // 修正输入框文字偏移：设置垂直居中
                                const inputs = clonedDoc.querySelectorAll('input[type="number"]');
                                inputs.forEach(function(inp) {
                                    inp.style.lineHeight = 'normal';
                                    inp.style.height = 'auto';
                                    inp.style.padding = '4px 10px';
                                    inp.style.display = 'inline-block';
                                    inp.style.verticalAlign = 'middle';
                                });

                                // 确保文本框高度正确
                                const clonedBlocks = clonedDoc.querySelectorAll(
                                    '.editable-block, .info-value');
                                clonedBlocks.forEach(function(el) {
                                    el.style.height = 'auto';
                                    el.style.height = el.scrollHeight + 'px';
                                    el.style.overflow = 'visible';
                                });
                            }
                        }).then(function(canvas) {
                            // 四周留白（约1cm = 76px 在2x缩放下）
                            const padding = 76;
                            const newWidth = canvas.width + padding * 2;
                            const newHeight = canvas.height + padding * 2;

                            const newCanvas = document.createElement('canvas');
                            newCanvas.width = newWidth;
                            newCanvas.height = newHeight;
                            const ctx = newCanvas.getContext('2d');

                            ctx.fillStyle = '#f2f5fa';
                            ctx.fillRect(0, 0, newWidth, newHeight);
                            ctx.drawImage(canvas, padding, padding);

                            btn.textContent = originalText;
                            btn.disabled = false;

                            const link = document.createElement('a');
                            link.download = 'TRPG招募.png';
                            link.href = newCanvas.toDataURL('image/png');
                            link.click();
                        }).catch(function(err) {
                            btn.textContent = originalText;
                            btn.disabled = false;
                            console.error('导出失败:', err);
                            alert('导出图片失败，请重试或检查控制台错误信息。');
                        });
                    }, 200);
                });
            });

            console.log('TRPG 招募页面已加载，当前模式: 招募PL');
            console.log('富文本编辑工具栏已启用 — 选中文字即可使用（加粗/斜体/颜色）');
        })();
    </script>

</body>
</html>
