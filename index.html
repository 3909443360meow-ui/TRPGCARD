<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRPG招募</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js">
    </script>
    <style>
        /* ===== 重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #f2f5fa 0%, #e4e9f2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        /* ===== 主容器 ===== */
        .app {
            width: 1160px;
            max-width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 40px;
            padding: 36px 42px 44px;
            box-shadow: 0 24px 56px -16px rgba(10, 30, 60, 0.22), 0 6px 20px -6px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.2s;
        }

        /* ===== 工具栏卡片（不导出） ===== */
        .toolbar-card {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
            gap: 14px;
            padding: 14px 24px;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.85);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03);
            min-height: 56px;
        }

        .toolbar-btn {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
            padding: 8px 22px;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar-btn:hover {
            transform: translateY(-2px);
        }
        .toolbar-btn:active {
            transform: translateY(0);
        }

        .btn-export {
            background: #4a6cf7;
            box-shadow: 0 4px 14px rgba(74, 108, 247, 0.25);
        }
        .btn-export:hover {
            background: #3a5cd9;
            box-shadow: 0 8px 24px rgba(74, 108, 247, 0.30);
        }

        .btn-toggle {
            background: #6c7a9a;
            box-shadow: 0 4px 14px rgba(108, 122, 154, 0.25);
        }
        .btn-toggle:hover {
            background: #5a6886;
            box-shadow: 0 8px 24px rgba(108, 122, 154, 0.30);
        }
        .btn-toggle.active-gm {
            background: #9b6bcf;
            box-shadow: 0 4px 14px rgba(155, 107, 207, 0.25);
        }
        .btn-toggle.active-gm:hover {
            background: #8a5bb8;
            box-shadow: 0 8px 24px rgba(155, 107, 207, 0.30);
        }

        .toolbar-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ===== 顶部标题 ===== */
        .app-header {
            text-align: center;
            padding-bottom: 28px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(60, 80, 140, 0.12);
            position: relative;
        }

        .app-header h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 6px;
            color: #1a264f;
            display: inline-block;
            position: relative;
        }

        /* ===== 双列网格 ===== */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px 40px;
            align-items: start;
        }

        /* ===== 列 ===== */
        .col {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 0;
        }

        /* ===== 卡片 ===== */
        .block {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 22px 24px 24px;
            border: 1px solid rgba(255, 255, 255, 0.85);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03);
            transition: box-shadow 0.2s;
        }

        .block-title {
            font-size: 17px;
            font-weight: 600;
            color: #1a264f;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
            transition: color 0.2s;
        }

        /* ===== 左列 — 模组信息标题 ===== */
        .mod-title {
            font-size: 22px;
            font-weight: 700;
            color: #1a264f;
            letter-spacing: 1.5px;
            padding-bottom: 2px;
        }

        /* ===== 图片上传区域 ===== */
        .image-upload-wrapper {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 56.25%;
            border-radius: 16px;
            overflow: hidden;
            background: #e8ecf5;
            border: 2px dashed rgba(90, 110, 180, 0.25);
            cursor: pointer;
            transition: border-color 0.3s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-upload-wrapper:hover {
            border-color: rgba(60, 80, 160, 0.45);
            background: #e2e7f2;
        }

        .image-upload-wrapper .upload-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8a9bbd;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
            pointer-events: none;
            user-select: none;
            gap: 6px;
        }

        .image-upload-wrapper .upload-placeholder .arrow-icon {
            font-size: 28px;
            font-weight: 300;
            color: #b0c0dd;
            line-height: 1;
        }

        .image-upload-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .image-upload-wrapper img.loaded {
            display: block;
        }
        .image-upload-wrapper .upload-placeholder.hidden {
            display: none;
        }
        #imageInput {
            display: none;
        }

        /* ===== 五个信息标签 ===== */
        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 4px 0 2px;
        }

        .info-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
            padding: 3px 0;
            border-bottom: 1px dashed rgba(60, 80, 140, 0.07);
        }

        .info-label {
            display: inline-block;
            width: 140px;
            flex-shrink: 0;
            text-align: left;
            font-weight: 700;
            color: #111b3a;
            font-size: 15px;
            letter-spacing: 0.02em;
            line-height: 1.6;
        }

        .info-value {
            flex: 1;
            font-size: 15px;
            color: #1a264f;
            font-weight: 500;
            padding: 2px 6px;
            border-radius: 6px;
            outline: none;
            transition: background 0.15s;
            min-height: 1.6em;
            line-height: 1.6;
            word-break: break-all;
            background: transparent;
            border: 1px solid transparent;
            cursor: text;
        }

        .info-value:empty::before {
            content: '点击输入';
            color: #b8c6e0;
            font-weight: 400;
        }
        .info-value:focus {
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(60, 80, 160, 0.25);
            box-shadow: 0 0 0 3px rgba(60, 80, 160, 0.06);
        }

        /* ===== 模组简介 (大文本框) ===== */
        .textarea-wrap {
            margin-top: 2px;
        }
        .textarea-wrap .block-title {
            margin-bottom: 10px;
        }

        .auto-textarea {
            width: 100%;
            padding: 14px 18px;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.7;
            color: #1a264f;
            background: rgba(255, 255, 255, 0.7);
            border: 1.5px solid rgba(60, 80, 160, 0.15);
            border-radius: 14px;
            outline: none;
            resize: none;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
            min-height: 72px;
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.02);
        }

        .auto-textarea:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 4px rgba(60, 80, 160, 0.10), inset 0 1px 4px rgba(0, 0, 0, 0.02);
            background: rgba(255, 255, 255, 0.9);
        }
        .auto-textarea::placeholder {
            color: #b0bedb;
            font-weight: 400;
            font-size: 14px;
        }

        /* ===== 右列 — 合并卡片 ===== */
        .merged-card .merged-section {
            padding: 6px 0;
        }
        .merged-card .merged-section+.merged-section {
            border-top: 1px solid rgba(60, 80, 140, 0.08);
            padding-top: 14px;
            margin-top: 4px;
        }
        .merged-card .section-label {
            font-size: 15px;
            font-weight: 600;
            color: #1a264f;
            display: block;
            margin-bottom: 8px;
        }

        /* 游玩方式 */
        .play-style-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 16px;
        }

        .option-chip {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 6px 16px 6px 12px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid transparent;
            transition: all 0.2s ease;
            user-select: none;
            font-weight: 500;
            font-size: 15px;
            color: #3d4a6b;
        }

        .option-chip:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(60, 80, 160, 0.15);
        }

        .option-chip .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #d0d8e8;
            flex-shrink: 0;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .option-chip .dot::after {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: transparent;
            transition: all 0.25s ease;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .option-chip.active {
            background: rgba(60, 80, 160, 0.08);
            border-color: rgba(60, 80, 160, 0.25);
            color: #1a264f;
        }

        .option-chip.active .dot {
            background: #4a6cf7;
            box-shadow: 0 2px 8px rgba(60, 80, 160, 0.30);
        }

        .option-chip.active .dot::after {
            content: '✓';
            width: auto;
            height: auto;
            border-radius: 0;
            background: transparent;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            line-height: 1;
            position: static;
            transform: none;
        }

        /* 表单行 */
        .form-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 14px;
            padding: 2px 0;
        }

        .form-row .label {
            font-size: 15px;
            font-weight: 600;
            color: #1a264f;
            white-space: nowrap;
        }

        .form-row .input-text {
            padding: 8px 14px;
            font-size: 15px;
            font-family: inherit;
            border: 1.5px solid rgba(60, 80, 160, 0.15);
            border-radius: 12px;
            outline: none;
            background: rgba(255, 255, 255, 0.7);
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #1a264f;
            width: 72px;
            text-align: center;
            font-weight: 500;
        }

        .form-row .input-text:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 4px rgba(60, 80, 160, 0.08);
            background: rgba(255, 255, 255, 0.9);
        }

        .form-row .input-text.number {
            width: 64px;
            -moz-appearance: textfield;
        }
        .form-row .input-text.number::-webkit-outer-spin-button,
        .form-row .input-text.number::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* 招募PL人数 section（切换时隐藏） */
        #plCountSection {
            transition: opacity 0.3s ease, max-height 0.3s ease, padding 0.3s ease, margin 0.3s ease;
            overflow: hidden;
            max-height: 120px;
            opacity: 1;
            padding: 6px 0;
        }
        #plCountSection.hidden {
            max-height: 0;
            opacity: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
            pointer-events: none;
        }

        /* 有偿招募 */
        .pay-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px 18px;
            padding: 2px 0;
        }

        .pay-group .label {
            font-size: 15px;
            font-weight: 600;
            color: #1a264f;
            white-space: nowrap;
        }

        .pay-options {
            display: flex;
            gap: 8px 16px;
            flex-wrap: wrap;
        }

        .option-chip.small {
            padding: 4px 14px 4px 10px;
            font-size: 14px;
        }
        .option-chip.small .dot {
            width: 16px;
            height: 16px;
        }
        .option-chip.small .dot::after {
            width: 7px;
            height: 7px;
        }
        .option-chip.small.active .dot::after {
            font-size: 10px;
        }

        /* 报价文本框 */
        .quote-wrap {
            margin-top: 6px;
            padding-left: 2px;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                opacity 0.3s ease,
                margin 0.3s ease;
        }

        .quote-wrap.open {
            max-height: 200px;
            opacity: 1;
            margin-top: 14px;
        }

        .quote-wrap .quote-label {
            font-size: 14px;
            font-weight: 600;
            color: #4a6cf7;
            display: block;
            margin-bottom: 6px;
        }

        .quote-wrap .auto-textarea {
            min-height: 48px;
            padding: 12px 16px;
            font-size: 14px;
        }

        /* ===== GM / 要求 / 事前须知 大文本框 ===== */
        .big-textarea-block .block-title {
            margin-bottom: 10px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 860px) {
            body {
                padding: 20px 12px;
            }
            .app {
                padding: 24px 18px 30px;
                border-radius: 28px;
            }
            .toolbar-card {
                padding: 12px 16px;
                min-height: 48px;
                gap: 10px;
                justify-content: flex-end;
            }
            .toolbar-btn {
                font-size: 13px;
                padding: 6px 16px;
            }
            .app-header h1 {
                font-size: 28px;
                letter-spacing: 3px;
            }
            .grid {
                gap: 24px 20px;
            }
            .block {
                padding: 18px 16px 20px;
                border-radius: 16px;
            }
            .info-label {
                width: 120px;
                font-size: 14px;
            }
            .info-value {
                font-size: 14px;
            }
            .option-chip {
                font-size: 14px;
                padding: 5px 12px 5px 10px;
            }
            .option-chip .dot {
                width: 16px;
                height: 16px;
            }
            .form-row .label {
                font-size: 14px;
            }
            .form-row .input-text {
                font-size: 14px;
                padding: 6px 12px;
                width: 60px;
            }
            .form-row .input-text.number {
                width: 56px;
            }
            .pay-group .label {
                font-size: 14px;
            }
            .mod-title {
                font-size: 20px;
            }
        }

        @media (max-width: 680px) {
            .app {
                padding: 16px 12px 22px;
                border-radius: 20px;
            }
            .toolbar-card {
                padding: 10px 12px;
                min-height: 42px;
                gap: 8px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .toolbar-btn {
                font-size: 12px;
                padding: 5px 14px;
            }
            .app-header {
                padding-bottom: 18px;
                margin-bottom: 18px;
            }
            .app-header h1 {
                font-size: 22px;
                letter-spacing: 2px;
            }
            .grid {
                gap: 16px 12px;
                grid-template-columns: 1fr 1fr;
            }
            .block {
                padding: 14px 12px 16px;
                border-radius: 14px;
            }
            .mod-title {
                font-size: 18px;
            }
            .info-label {
                width: 100px;
                font-size: 13px;
            }
            .info-value {
                font-size: 13px;
                padding: 1px 4px;
            }
            .block-title {
                font-size: 15px;
                margin-bottom: 10px;
            }
            .auto-textarea {
                font-size: 14px;
                padding: 10px 14px;
                min-height: 56px;
                border-radius: 12px;
            }
            .option-chip {
                font-size: 13px;
                padding: 4px 10px 4px 8px;
                gap: 8px;
            }
            .option-chip .dot {
                width: 14px;
                height: 14px;
            }
            .option-chip .dot::after {
                width: 6px;
                height: 6px;
            }
            .option-chip.active .dot::after {
                font-size: 9px;
            }
            .form-row {
                gap: 4px 8px;
            }
            .form-row .label {
                font-size: 13px;
            }
            .form-row .input-text {
                font-size: 13px;
                padding: 5px 8px;
                width: 50px;
                border-radius: 10px;
            }
            .form-row .input-text.number {
                width: 46px;
            }
            .pay-group .label {
                font-size: 13px;
            }
            .pay-options {
                gap: 4px 10px;
            }
            .option-chip.small {
                font-size: 12px;
                padding: 3px 10px 3px 8px;
            }
            .option-chip.small .dot {
                width: 14px;
                height: 14px;
            }
            .quote-wrap .quote-label {
                font-size: 13px;
            }
            .quote-wrap .auto-textarea {
                font-size: 13px;
                min-height: 44px;
                padding: 10px 14px;
            }
            .big-textarea-block .block-title {
                font-size: 15px;
            }
            .merged-card .section-label {
                font-size: 14px;
            }
            #plCountSection {
                max-height: 100px;
            }
            #plCountSection.hidden {
                max-height: 0;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px 4px;
            }
            .app {
                padding: 12px 8px 16px;
                border-radius: 16px;
            }
            .toolbar-card {
                padding: 8px 10px;
                min-height: 36px;
                gap: 6px;
                border-radius: 14px;
            }
            .toolbar-btn {
                font-size: 11px;
                padding: 4px 12px;
            }
            .app-header {
                padding-bottom: 14px;
                margin-bottom: 14px;
            }
            .app-header h1 {
                font-size: 18px;
                letter-spacing: 1.5px;
            }
            .grid {
                gap: 10px 8px;
            }
            .block {
                padding: 10px 8px 12px;
                border-radius: 12px;
            }
            .info-label {
                width: 80px;
                font-size: 12px;
            }
            .info-value {
                font-size: 12px;
            }
            .option-chip {
                font-size: 12px;
                padding: 3px 8px 3px 6px;
                gap: 6px;
            }
            .option-chip .dot {
                width: 12px;
                height: 12px;
            }
            .form-row .input-text {
                font-size: 12px;
                padding: 4px 6px;
                width: 40px;
            }
            .form-row .input-text.number {
                width: 38px;
            }
            .mod-title {
                font-size: 16px;
            }
            .block-title {
                font-size: 14px;
            }
            .auto-textarea {
                font-size: 13px;
                padding: 8px 12px;
                min-height: 48px;
            }
            .image-upload-wrapper .upload-placeholder {
                font-size: 13px;
            }
            .image-upload-wrapper .upload-placeholder .arrow-icon {
                font-size: 22px;
            }
            .pay-group .label {
                font-size: 12px;
            }
            .option-chip.small {
                font-size: 11px;
                padding: 2px 8px 2px 6px;
            }
            .option-chip.small .dot {
                width: 12px;
                height: 12px;
            }
        }

        /* ===== 工具 ===== */
        .mt-1 {
            margin-top: 4px;
        }
        .mb-1 {
            margin-bottom: 4px;
        }
        .flex-col {
            display: flex;
            flex-direction: column;
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.02);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(60, 80, 160, 0.18);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(60, 80, 160, 0.32);
        }

        /* ===== 选中动画 ===== */
        .option-chip.active {
            animation: pop 0.25s ease;
        }

        @keyframes pop {
            0% {
                transform: scale(0.96);
            }
            50% {
                transform: scale(1.04);
            }
            100% {
                transform: scale(1);
            }
        }

        /* ===== 图片上传过渡 ===== */
        .image-upload-wrapper img {
            transition: opacity 0.3s ease;
        }
        .image-upload-wrapper img.loaded {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="app" id="appContainer">

        <!-- ===== 工具栏卡片（不导出） ===== -->
        <div class="toolbar-card" id="toolbarCard">
            <button class="toolbar-btn btn-export" id="exportBtn">📷 导出图片</button>
            <button class="toolbar-btn btn-toggle" id="toggleModeBtn">切换到招募GM</button>
        </div>

        <!-- ===== 顶部标题 ===== -->
        <header class="app-header">
            <div class="title-wrap">
                <h1>TRPG 招募</h1>
            </div>
        </header>

        <!-- ===== 双列内容 ===== -->
        <div class="grid">

            <!-- ===== 左列：模组信息 ===== -->
            <div class="col col-left">

                <div class="mod-title">模组信息</div>

                <!-- 图片上传 -->
                <div class="image-upload-wrapper" id="imageUploader">
                    <div class="upload-placeholder" id="uploadPlaceholder">
                        <span class="arrow-icon">↑</span>
                        <span>点击上传图片</span>
                    </div>
                    <img id="previewImage" alt="模组封面" />
                    <input type="file" id="imageInput" accept="image/*" />
                </div>

                <!-- 五个信息标签 -->
                <div class="info-grid">
                    <div class="info-row">
                        <span class="info-label">模组名：</span>
                        <span class="info-value" contenteditable="true"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">规则：</span>
                        <span class="info-value" contenteditable="true"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">舞台：</span>
                        <span class="info-value" contenteditable="true"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">人数：</span>
                        <span class="info-value" contenteditable="true"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">游玩时间：</span>
                        <span class="info-value" contenteditable="true"></span>
                    </div>
                </div>

                <!-- 模组简介 -->
                <div class="textarea-wrap block">
                    <div class="block-title">模组简介</div>
                    <textarea class="auto-textarea" placeholder="点击输入" rows="2"></textarea>
                </div>

            </div>

            <!-- ===== 右列：招募详情 ===== -->
            <div class="col col-right">

                <!-- 合并卡片：游玩方式 + 招募PL人数 + 有偿招募 -->
                <div class="block merged-card">

                    <!-- 游玩方式 -->
                    <div class="merged-section">
                        <span class="section-label">游玩方式</span>
                        <div class="play-style-group">
                            <div class="option-chip active" data-group="play" data-value="text">
                                <span class="dot"></span> 文字团
                            </div>
                            <div class="option-chip" data-group="play" data-value="voice">
                                <span class="dot"></span> 语音团
                            </div>
                            <div class="option-chip" data-group="play" data-value="face">
                                <span class="dot"></span> 面团
                            </div>
                        </div>
                    </div>

                    <!-- 招募PL人数（切换时隐藏） -->
                    <div class="merged-section" id="plCountSection">
                        <div class="form-row">
                            <span class="label">招募PL人数</span>
                            <input class="input-text number" type="number" min="1" max="10" value="4" id="playerCount" />
                            <span style="font-size:14px;color:#6b7c9f;">人</span>
                        </div>
                    </div>

                    <!-- 有偿招募 -->
                    <div class="merged-section">
                        <div class="pay-group">
                            <span class="label">是否为有偿招募</span>
                            <div class="pay-options">
                                <div class="option-chip small active" data-group="pay" data-value="yes">
                                    <span class="dot"></span> 是
                                </div>
                                <div class="option-chip small" data-group="pay" data-value="no">
                                    <span class="dot"></span> 否
                                </div>
                            </div>
                        </div>
                        <!-- 报价 / 预算 -->
                        <div class="quote-wrap open" id="quoteWrap">
                            <span class="quote-label" id="quoteLabel">报价</span>
                            <textarea class="auto-textarea" placeholder="点击输入" rows="1"></textarea>
                        </div>
                    </div>

                </div>

                <!-- ===== 事前须知 (不变) ===== -->
                <div class="big-textarea-block block">
                    <div class="block-title">事前须知</div>
                    <textarea class="auto-textarea" placeholder="点击输入" rows="2"></textarea>
                </div>

                <!-- ===== GM可以做到 / PL可以做到 (切换) ===== -->
                <div class="big-textarea-block block" id="gmBlock">
                    <div class="block-title" id="gmTitle">GM 可以做到</div>
                    <textarea class="auto-textarea" placeholder="点击输入" rows="2"></textarea>
                </div>

                <!-- ===== 对PL的要求 / 对GM的要求 (切换) ===== -->
                <div class="big-textarea-block block" id="plRequirementBlock">
                    <div class="block-title" id="plRequirementTitle">对 PL 的要求</div>
                    <textarea class="auto-textarea" placeholder="点击输入" rows="2"></textarea>
                </div>

            </div>
            <!-- /右列 -->

        </div>
        <!-- /grid -->

    </div>
    <!-- /app -->

    <script>
        (function() {
            'use strict';

            // ===== 1. 自动调整 textarea 高度 =====
            const autoTextareas = document.querySelectorAll('.auto-textarea');

            function resizeTextarea(el) {
                el.style.height = 'auto';
                el.style.height = el.scrollHeight + 'px';
            }

            autoTextareas.forEach(function(ta) {
                resizeTextarea(ta);
                ta.addEventListener('input', function() {
                    resizeTextarea(this);
                });
            });

            let resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    autoTextareas.forEach(function(el) {
                        resizeTextarea(el);
                    });
                }, 150);
            });

            // ===== 2. 图片上传 =====
            const uploader = document.getElementById('imageUploader');
            const fileInput = document.getElementById('imageInput');
            const previewImg = document.getElementById('previewImage');
            const placeholder = document.getElementById('uploadPlaceholder');

            uploader.addEventListener('click', function() {
                fileInput.click();
            });

            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    previewImg.src = ev.target.result;
                    previewImg.classList.add('loaded');
                    placeholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            });

            // ===== 3. 选项芯片 (点击切换) =====
            const chips = document.querySelectorAll('.option-chip');

            chips.forEach(function(chip) {
                chip.addEventListener('click', function(e) {
                    const group = this.dataset.group;
                    if (!group) return;

                    const siblings = document.querySelectorAll('.option-chip[data-group="' + group + '"]');
                    siblings.forEach(function(sib) {
                        sib.classList.remove('active');
                    });
                    this.classList.add('active');

                    // 有偿招募逻辑
                    if (group === 'pay') {
                        const quoteWrap = document.getElementById('quoteWrap');
                        const isYes = this.dataset.value === 'yes';
                        if (isYes) {
                            quoteWrap.classList.add('open');
                            setTimeout(function() {
                                const ta = quoteWrap.querySelector('.auto-textarea');
                                if (ta) resizeTextarea(ta);
                            }, 50);
                        } else {
                            quoteWrap.classList.remove('open');
                        }
                    }
                });
            });

            // ===== 4. 初始化状态 =====
            // 确保有偿招募 '是' 激活，报价框打开
            let payActive = document.querySelector('.option-chip[data-group="pay"].active');
            if (!payActive) {
                const yesChip = document.querySelector('.option-chip[data-group="pay"][data-value="yes"]');
                if (yesChip) {
                    yesChip.classList.add('active');
                }
            }
            const quoteWrap = document.getElementById('quoteWrap');
            const activePay = document.querySelector('.option-chip[data-group="pay"].active');
            if (activePay && activePay.dataset.value === 'yes') {
                quoteWrap.classList.add('open');
            } else {
                quoteWrap.classList.remove('open');
            }

            // 游玩方式至少一个激活
            const playActive = document.querySelector('.option-chip[data-group="play"].active');
            if (!playActive) {
                const first = document.querySelector('.option-chip[data-group="play"]');
                if (first) first.classList.add('active');
            }

            // ===== 5. 数字输入限制 (仅手动输入) =====
            const numberInput = document.getElementById('playerCount');
            if (numberInput) {
                numberInput.addEventListener('input', function() {
                    this.value = this.value.replace(/[^0-9]/g, '');
                    let val = parseInt(this.value, 10);
                    if (val < 1 && this.value !== '') {
                        this.value = '1';
                    }
                    if (val > 10) {
                        this.value = '10';
                    }
                });
                numberInput.addEventListener('blur', function() {
                    if (this.value === '' || isNaN(parseInt(this.value, 10))) {
                        this.value = '4';
                    }
                    let val = parseInt(this.value, 10);
                    if (val < 1) this.value = '1';
                    if (val > 10) this.value = '10';
                });
            }

            // ===== 6. 切换模式：招募PL ↔ 招募GM（包含报价/预算切换） =====
            let currentMode = 'pl'; // 'pl' 或 'gm'

            const toggleBtn = document.getElementById('toggleModeBtn');
            const plCountSection = document.getElementById('plCountSection');
            const gmTitle = document.getElementById('gmTitle');
            const plRequirementTitle = document.getElementById('plRequirementTitle');
            const quoteLabel = document.getElementById('quoteLabel');

            function updateMode(mode) {
                currentMode = mode;
                if (mode === 'gm') {
                    // 切换到招募GM
                    plCountSection.classList.add('hidden');
                    gmTitle.textContent = 'PL 可以做到';
                    plRequirementTitle.textContent = '对 GM 的要求';
                    quoteLabel.textContent = '预算';
                    toggleBtn.textContent = '切换到招募PL';
                    toggleBtn.classList.add('active-gm');
                } else {
                    // 切换到招募PL
                    plCountSection.classList.remove('hidden');
                    gmTitle.textContent = 'GM 可以做到';
                    plRequirementTitle.textContent = '对 PL 的要求';
                    quoteLabel.textContent = '报价';
                    toggleBtn.textContent = '切换到招募GM';
                    toggleBtn.classList.remove('active-gm');
                }
                // 重新调整textarea高度
                setTimeout(function() {
                    autoTextareas.forEach(function(ta) {
                        resizeTextarea(ta);
                    });
                }, 100);
            }

            toggleBtn.addEventListener('click', function() {
                if (currentMode === 'pl') {
                    updateMode('gm');
                } else {
                    updateMode('pl');
                }
            });

            // 初始状态：招募PL
            updateMode('pl');

            // ===== 7. 导出图片（长图截图 + 四周留白约1cm） =====
            const exportBtn = document.getElementById('exportBtn');
            const appContainer = document.getElementById('appContainer');
            const toolbarCard = document.getElementById('toolbarCard');

            // 检查 html2canvas 是否加载
            if (typeof html2canvas === 'undefined') {
                exportBtn.textContent = '加载中...';
                exportBtn.disabled = true;
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
                script.onload = function() {
                    exportBtn.textContent = '📷 导出图片';
                    exportBtn.disabled = false;
                };
                script.onerror = function() {
                    exportBtn.textContent = '加载失败';
                    alert('html2canvas 库加载失败，请检查网络连接后刷新页面。');
                };
                document.head.appendChild(script);
            }

            exportBtn.addEventListener('click', function() {
                const btn = this;
                if (btn.disabled) return;

                if (typeof html2canvas === 'undefined') {
                    alert('导出库尚未加载完成，请稍后重试。');
                    return;
                }

                const originalText = btn.textContent;
                btn.textContent = '导出中...';
                btn.disabled = true;

                // 获取 app 容器的滚动尺寸（完整内容）
                const width = appContainer.scrollWidth;
                const height = appContainer.scrollHeight;

                html2canvas(appContainer, {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#f2f5fa',
                    logging: false,
                    width: width,
                    height: height,
                    windowWidth: width,
                    windowHeight: height,
                    ignoreElements: function(element) {
                        // 忽略工具栏卡片及其所有子元素
                        if (element === toolbarCard || toolbarCard.contains(element)) {
                            return true;
                        }
                        return false;
                    }
                }).then(function(canvas) {
                    // ---- 在图片四周添加边距（约1cm，在2x缩放下为76px） ----
                    const padding = 76; // 约1cm (2x缩放下)
                    const newWidth = canvas.width + padding * 2;
                    const newHeight = canvas.height + padding * 2;

                    const newCanvas = document.createElement('canvas');
                    newCanvas.width = newWidth;
                    newCanvas.height = newHeight;
                    const ctx = newCanvas.getContext('2d');

                    // 填充背景色（与网页背景一致）
                    ctx.fillStyle = '#f2f5fa';
                    ctx.fillRect(0, 0, newWidth, newHeight);

                    // 将原图居中绘制
                    ctx.drawImage(canvas, padding, padding);

                    // 导出最终图片
                    btn.textContent = originalText;
                    btn.disabled = false;
                    const link = document.createElement('a');
                    link.download = 'TRPG招募.png';
                    link.href = newCanvas.toDataURL('image/png');
                    link.click();
                }).catch(function(err) {
                    btn.textContent = originalText;
                    btn.disabled = false;
                    console.error('导出失败:', err);
                    alert('导出图片失败，请重试或检查控制台错误信息。');
                });
            });

            console.log('TRPG 招募页面已加载，当前模式: 招募PL');
        })();
    </script>

</body>
</html>
